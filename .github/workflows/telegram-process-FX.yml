# .github/workflows/FX-telegram-processor.yml
name: FX Telegram Message Processor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Processing mode'
        required: true
        type: choice
        options:
          - process_queue
          - setup_webhook
          - check_status

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup FX Webhook
        if: github.event.inputs.mode == 'setup_webhook'
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "🔗 Setting up FX webhook..."
          RESPONSE=$(curl -s "${CLOUDFLARE_WORKER_URL}/setup-webhook")
          echo "$RESPONSE" | jq '.'
      
      - name: Process Queue (One Message at a Time)
        if: github.event.inputs.mode == 'process_queue'
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "🔄 Processing FX message queue (one message per API call)..."
          
          PROCESSED=0
          MAX_ITERATIONS=50  # Safety limit
          
          for i in $(seq 1 $MAX_ITERATIONS); do
            # Check queue count first
            QUEUE_COUNT=$(curl -s "${CLOUDFLARE_WORKER_URL}/queue-count" | jq -r '.count')
            
            if [ "$QUEUE_COUNT" = "0" ] || [ -z "$QUEUE_COUNT" ]; then
              echo "✅ Queue is empty. Processing complete!"
              break
            fi
            
            echo "📊 Queue has $QUEUE_COUNT messages remaining. Processing next message..."
            
            # Process one message
            RESPONSE=$(curl -s -X POST "${CLOUDFLARE_WORKER_URL}/process-one" \
              -H "Content-Type: application/json")
            
            echo "Response: $RESPONSE"
            
            # Check if processing was successful
            STATUS=$(echo "$RESPONSE" | jq -r '.status')
            
            if [ "$STATUS" = "processed" ]; then
              PROCESSED=$((PROCESSED + 1))
              MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.messageId')
              ISSUE_NUM=$(echo "$RESPONSE" | jq -r '.issue_number')
              REMAINING=$(echo "$RESPONSE" | jq -r '.queue_remaining')
              
              echo "✅ Processed message #$MESSAGE_ID -> Issue #$ISSUE_NUM ($REMAINING remaining)"
              
              # Commit progress after each message
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              
              if [[ $(git status --porcelain | grep "tg/FX-files/") ]]; then
                git add tg/FX-files/
                git commit -m "FX Bot: Processed message $MESSAGE_ID [skip ci]"
                git push
                echo "📤 Progress committed"
              fi
              
            elif [ "$STATUS" = "already_processed" ]; then
              echo "⏭️ Message already processed, skipping..."
            elif [ "$STATUS" = "empty" ]; then
              echo "✅ Queue empty, stopping..."
              break
            else
              ERROR=$(echo "$RESPONSE" | jq -r '.error // "unknown"')
              echo "❌ Error processing message: $ERROR"
              # Continue with next message even if one fails
            fi
            
            # Small delay to avoid rate limiting
            sleep 1
            
          done
          
          echo "🎉 Queue processing complete! Processed $PROCESSED messages."
      
      - name: Check Status
        if: github.event.inputs.mode == 'check_status'
        env:
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          echo "📊 Checking FX bot status..."
          
          STATUS=$(curl -s "${CLOUDFLARE_WORKER_URL}/status")
          echo "$STATUS" | jq '.'
          
          QUEUE_COUNT=$(curl -s "${CLOUDFLARE_WORKER_URL}/queue-count")
          echo "Queue: $QUEUE_COUNT" | jq '.'
      
      - name: Final Commit
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [[ $(git status --porcelain | grep "tg/FX-files/") ]]; then
            git add tg/FX-files/
            git commit -m "FX Bot: Final progress update [skip ci]"
            git push
            echo "✅ Final changes committed"
          else
            echo "ℹ️ No changes to commit"
          fi
